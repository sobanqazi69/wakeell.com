name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy webhook
        run: |
          curl -X POST http://72.61.147.68:9000/deploy \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            --fail \
            --max-time 30
